<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Farm Instincts Strengths Assessment</title>
<style>

  #page-home {

    background: linear-gradient(160deg, #78350f 0%, #1c1917 60%);

  }
  .logo { font-size: 64px; margin-bottom: 20px; }
  #page-home p { color: #d6d3d1; font-size: 15px; max-width: 420px; line-height: 1.85; margin-bottom: 28px; }
  .arch-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 28px; }

  .btn-primary { background: #d97706; color: #fff; border: none; border-radius: 10px; padding: 15px 38px; font-size: 18px; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
  .btn-primary:hover { background: #b45309; }

  .lang-btn.active { background: #d97706; color: #fff; }
  .lang-btn:hover:not(.active) { color: #d6d3d1; }

  #page-name { min-height: 100vh; background: #1c1917; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
  #page-name .icon { font-size: 48px; margin-bottom: 16px; }
  #page-name h2 { color: #fef3c7; font-size: 24px; margin-bottom: 8px; }
  #page-name p { color: #a8a29e; margin-bottom: 24px; font-size: 15px; }
  #name-input { background: #292524; border: 2px solid #57534e; border-radius: 8px; padding: 12px 20px; font-size: 17px; color: #fef3c7; width: 280px; outline: none; margin-bottom: 20px; text-align: center; display: block; }
  #name-input:focus { border-color: #d97706; }
  #btn-name-next { background: #57534e; color: #fff; border: none; border-radius: 8px; padding: 14px 36px; font-size: 16px; font-weight: bold; cursor: default; }
  #btn-name-next.active { background: #d97706; cursor: pointer; }
  #btn-name-next.active:hover { background: #b45309; }

  #page-quiz { min-height: 100vh; background: #1c1917; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .quiz-inner { width: 100%; max-width: 560px; }
  .quiz-meta { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .quiz-meta span { color: #a8a29e; font-size: 13px; }
  .quiz-meta .pct { color: #d97706; font-weight: bold; }
  .progress-bar { background: #292524; border-radius: 4px; height: 6px; margin-bottom: 32px; overflow: hidden; }
  .progress-fill { background: #d97706; height: 100%; border-radius: 4px; transition: width 0.3s; }
  .question-card { background: #292524; border-radius: 16px; padding: 32px 28px; margin-bottom: 28px; }
  .question-card p { color: #fef3c7; font-size: 19px; line-height: 1.6; font-style: italic; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn { background: rgba(255,255,255,0.05); border: 2px solid #44403c; border-radius: 10px; padding: 13px 18px; color: #e7e5e4; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; text-align: left; transition: all 0.15s; }
  .opt-btn:hover { background: rgba(217,119,6,0.2); border-color: #d97706; }
  .opt-num { background: #44403c; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #d97706; font-weight: bold; flex-shrink: 0; }
  .btn-back { margin-top: 20px; background: transparent; border: none; color: #78716c; font-size: 14px; cursor: pointer; }
  .btn-back:hover { color: #a8a29e; }

  #page-result { min-height: 100vh; background: #1c1917; padding: 24px 16px; }
  .result-inner { max-width: 640px; margin: 0 auto; }
  .result-header { border-radius: 16px; padding: 28px 24px; margin-bottom: 20px; text-align: center; }
  .result-header .big-emoji { font-size: 56px; margin-bottom: 8px; }
  .result-header .label { color: #a8a29e; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .result-header h1 { color: #fef3c7; font-size: 28px; margin-bottom: 6px; }
  .archetype-badge { display: inline-block; border-radius: 20px; padding: 6px 18px; margin-bottom: 10px; }
  .archetype-badge span { color: #fff; font-weight: bold; font-size: 18px; }
  .result-header .tagline { color: #d6d3d1; font-size: 15px; font-style: italic; margin-top: 4px; }
  .result-header .secondary { color: #78716c; font-size: 13px; margin-top: 8px; }
  .result-header .secondary strong { color: #a8a29e; }
  .card { background: #292524; border-radius: 14px; padding: 22px 20px; margin-bottom: 20px; }
  .card h2 { color: #d97706; font-size: 15px; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
  .card p { color: #d6d3d1; font-size: 15px; line-height: 1.7; margin-bottom: 12px; }
  .card ul { padding-left: 18px; }
  .card ul li { color: #e7e5e4; font-size: 14px; line-height: 1.9; }
  .card-green { background: rgba(20,83,45,0.13); border: 1px solid #166534; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
  .card-green h2 { color: #4ade80; font-size: 15px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .card-green p { color: #d6d3d1; font-size: 15px; line-height: 1.7; }
  .card-red { background: rgba(127,29,29,0.13); border: 1px solid #991b1b; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
  .card-red h2 { color: #f87171; font-size: 15px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .card-red p { color: #d6d3d1; font-size: 14px; line-height: 1.7; margin-bottom: 8px; }
  .card-red strong { color: #fca5a5; }
  .card-blue { background: rgba(30,58,95,0.13); border: 1px solid #1d4ed8; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
  .card-blue h2 { color: #60a5fa; font-size: 15px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .card-blue p { color: #d6d3d1; font-size: 15px; line-height: 1.7; }
  .card-secondary { background: #292524; border-radius: 14px; padding: 20px; margin-bottom: 28px; }
  .card-secondary h2 { color: #a8a29e; font-size: 15px; margin-bottom: 10px; }
  .card-secondary p { color: #a8a29e; font-size: 14px; line-height: 1.7; }
  .score-row { margin-bottom: 14px; }
  .score-label-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .score-label-row .lbl { color: #e7e5e4; font-size: 14px; }
  .score-label-row .val { font-size: 13px; font-weight: bold; }
  .bar-bg { background: #1c1917; border-radius: 4px; height: 10px; }
  .bar-fill { height: 100%; border-radius: 4px; }
  .btn-restart { width: 100%; background: #292524; border: 2px solid #44403c; border-radius: 10px; padding: 16px; color: #a8a29e; font-size: 15px; cursor: pointer; margin-bottom: 40px; }
  .btn-restart:hover { border-color: #78716c; color: #d6d3d1; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- HOME -->
<div id="page-home">
  <div class="logo">🌾</div>
  <h1 id="home-title" style="color:#fef3c7;font-size:28px;margin-bottom:4px;">Farm Instincts</h1>
  <h2 id="home-subtitle" style="color:#d97706;font-size:14px;font-weight:normal;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;">Strengths Assessment</h2>

  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-es" onclick="setLang('es')">ES</button>
  </div>

  <p id="home-desc"></p>

  <div class="arch-chips" id="arch-chips"></div>

  <button class="btn-primary" id="btn-start" onclick="showPage('name')"></button>
</div>

<!-- NAME -->
<div id="page-name" class="hidden">
  <div class="icon">👤</div>
  <h2 id="name-title"></h2>
  <p id="name-sub"></p>
  <input id="name-input" type="text" oninput="onNameInput()" onkeydown="if(event.key==='Enter') tryNext()" />
  <button id="btn-name-next" onclick="tryNext()"></button>
</div>

<!-- QUIZ -->
<div id="page-quiz" class="hidden">
  <div class="quiz-inner">
    <div class="quiz-meta"><span id="q-counter"></span><span class="pct" id="q-pct"></span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="question-card"><p id="q-text"></p></div>
    <div class="options" id="options-container"></div>
    <button class="btn-back" id="btn-back" onclick="goBack()"></button>
  </div>
</div>

<!-- RESULT -->
<div id="page-result" class="hidden">
  <div class="result-inner">
    <div class="result-header" id="result-header">
      <div class="big-emoji" id="r-emoji"></div>
      <p class="label" id="r-report-label"></p>
      <h1 id="r-name"></h1>
      <div class="archetype-badge" id="r-badge"><span id="r-primary-name"></span></div>
      <p class="tagline" id="r-tagline"></p>
      <p class="secondary"><span id="r-sec-label"></span> <strong id="r-secondary-name"></strong></p>
    </div>
    <div class="card"><h2 id="r-strengths-title"></h2><div id="scores-container"></div></div>
    <div class="card"><h2 id="r-best-title"></h2><p id="r-desc"></p><ul id="r-goodat"></ul></div>
    <div class="card-green"><h2 id="r-use-title"></h2><p id="r-bestfit"></p></div>
    <div class="card-red">
      <h2 id="r-watch-title"></h2>
      <p><strong id="r-frus-label"></strong> <span id="r-frustrated"></span></p>
      <p><strong id="r-strug-label"></strong> <span id="r-struggles"></span></p>
      <p><strong id="r-wrong-label"></strong> <span id="r-wrongrole"></span></p>
    </div>
    <div class="card-blue"><h2 id="r-manage-title"></h2><p id="r-manage"></p></div>
    <div class="card-secondary"><h2 id="r-sec-title"></h2><p id="r-sec-desc"></p></div>
    <button class="btn-restart" id="btn-restart" onclick="restart()"></button>
  </div>
</div>

  Mechanic:  {Action:2,Observation:2,Mechanical:5,Routine:2,Adaptability:2,LivestockAffinity:-1,LongTermThinking:1,Organisation:1,Leadership:0},
  Caretaker: {Action:0,Observation:3,Mechanical:-1,Routine:4,Adaptability:1,LivestockAffinity:5,LongTermThinking:2,Organisation:1,Leadership:1},
  Scout:     {Action:-1,Observation:5,Mechanical:1,Routine:2,Adaptability:2,LivestockAffinity:2,LongTermThinking:3,Organisation:1,Leadership:0},
  Organiser: {Action:1,Observation:2,Mechanical:1,Routine:3,Adaptability:1,LivestockAffinity:0,LongTermThinking:2,Organisation:5,Leadership:3},

let lang = "en";
let userName = "", currentQ = 0, answers = {};

function setLang(l) {
  lang = l;
  document.getElementById("btn-en").classList.toggle("active", l==="en");
  document.getElementById("btn-es").classList.toggle("active", l==="es");
  renderHome();
}

function renderHome() {
  const L = LANG[lang];
  document.getElementById("home-desc").innerHTML = L.homeDesc.replace(/\n/g,"<br>");
  const chips = document.getElementById("arch-chips");
  chips.innerHTML = L.chips.map(c=>`<span class="arch-chip">${c}</span>`).join("");
  document.getElementById("btn-start").textContent = L.startBtn;
}

function showPage(id) {
  ["home","name","quiz","result"].forEach(p=>{
    document.getElementById("page-"+p).classList.toggle("hidden", p!==id);
  });
  if (id==="name") renderNamePage();
}

function renderNamePage() {
  const L = LANG[lang];
  document.getElementById("name-title").textContent = L.nameTitle;
  document.getElementById("name-sub").textContent = L.nameSub;
  document.getElementById("name-input").placeholder = L.namePlaceholder;
  document.getElementById("btn-name-next").textContent = L.nameBtn;
}

function onNameInput() {
  const v = document.getElementById("name-input").value.trim();
  document.getElementById("btn-name-next").classList.toggle("active", v.length>0);
}

function tryNext() {
  const v = document.getElementById("name-input").value.trim();
  if (!v) return;
  userName=v; currentQ=0; answers={};
  renderQuestion(); showPage("quiz");
  document.getElementById("btn-back").textContent = LANG[lang].backBtn;
}

function renderQuestion() {
  const L = LANG[lang];
  const qs = QUESTIONS[lang];
  const total = qs.length, q = qs[currentQ];
  document.getElementById("q-counter").textContent = L.qOf(currentQ+1, total);
  const pct = Math.round((currentQ/total)*100);
  document.getElementById("q-pct").textContent = L.pctDone(pct);
  document.getElementById("progress-fill").style.width = `${pct}%`;
  document.getElementById("q-text").textContent = `"${q.q}"`;
  const c = document.getElementById("options-container"); c.innerHTML="";
  L.answerLabels.forEach((lbl,i)=>{
    const b=document.createElement("button");
    b.className="opt-btn";
    b.innerHTML=`<span class="opt-num">${i+1}</span>${lbl}`;
    b.onclick=()=>handleAnswer(i+1);
    c.appendChild(b);
  });
}

function handleAnswer(val) {
  answers[currentQ]=val;
  const qs = QUESTIONS[lang];
  if(currentQ<qs.length-1){currentQ++;renderQuestion();}
  else calcResult();
}

function goBack() {
  if(currentQ>0){currentQ--;renderQuestion();}else showPage("name");
}

function calcResult() {
  const keys=["Action","Observation","Mechanical","Routine","Adaptability","LivestockAffinity","LongTermThinking","Organisation","Leadership"];
  const raw={}, cnt={};
  keys.forEach(t=>{raw[t]=0;cnt[t]=0;});
  QUESTIONS[lang].forEach((q,i)=>{
    const v=answers[i]||3;
    q.traits.forEach(t=>{raw[t]+=v*q.dir;cnt[t]++;});
  });
  const scores={};
  keys.forEach(t=>{
    const mx=cnt[t]*5, mn=cnt[t]*1;
    scores[t]=Math.round(((raw[t]-mn)/(mx-mn))*10);
  });
  const archScores={};
  Object.entries(ARCHETYPE_WEIGHTS).forEach(([a,w])=>{
    let s=0; Object.entries(w).forEach(([t,v])=>s+=(scores[t]||5)*v);
    archScores[a]=s;
  });
  const sorted=Object.entries(archScores).sort((a,b)=>b[1]-a[1]);
  renderResult(scores, sorted[0][0], sorted[1][0]);
  showPage("result");
}

function levelLabel(v) {
  const lvls = LANG[lang].levels;
  for (const l of lvls) if(v<=l.max) return l;
  return lvls[lvls.length-1];
}

function renderResult(scores, primary, secondary) {
  const L = LANG[lang];
  const pa = ARCHETYPES[primary][lang];
  const sa = ARCHETYPES[secondary][lang];
  const paC = ARCHETYPES[primary].color;
  const saE = ARCHETYPES[secondary].emoji;

  const hdr=document.getElementById("result-header");
  hdr.style.background=`linear-gradient(135deg,${paC}33,#1c1917)`;
  hdr.style.border=`2px solid ${paC}`;
  document.getElementById("r-emoji").textContent=ARCHETYPES[primary].emoji;
  document.getElementById("r-report-label").textContent=L.reportLabel;
  document.getElementById("r-name").textContent=userName;
  document.getElementById("r-badge").style.background=paC;
  document.getElementById("r-primary-name").textContent=`${L.archetypePrefix} ${pa.name}`;
  document.getElementById("r-tagline").textContent=pa.tagline;
  document.getElementById("r-sec-label").textContent=L.secInstinct;
  document.getElementById("r-secondary-name").textContent=`${L.archetypePrefix} ${sa.name} ${saE}`;

  document.getElementById("r-strengths-title").textContent=L.strengthsTitle;
  const sc=document.getElementById("scores-container"); sc.innerHTML="";
  Object.entries(L.scoreLabels).forEach(([t,label])=>{
    const v=Math.max(0,Math.min(10,scores[t]??5)), lvl=levelLabel(v);
    const color = v<=3?"#9ca3af":v<=6?"#fbbf24":"#4ade80";
    sc.innerHTML+=`<div class="score-row"><div class="score-label-row"><span class="lbl">${label}</span><span class="val" style="color:${color}">${lvl.label} (${v}/10)</span></div><div class="bar-bg"><div class="bar-fill" style="width:${v*10}%;background:#d97706"></div></div></div>`;
  });

  document.getElementById("r-best-title").textContent=L.bestTitle;
  document.getElementById("r-desc").textContent=pa.desc;
  document.getElementById("r-goodat").innerHTML=pa.goodAt.map(g=>`<li>${g}</li>`).join("");
  document.getElementById("r-use-title").textContent=L.useTitle;
  document.getElementById("r-bestfit").textContent=pa.bestFit;
  document.getElementById("r-watch-title").textContent=L.watchTitle;
  document.getElementById("r-frus-label").textContent=L.frusLabel;
  document.getElementById("r-frustrated").textContent=pa.frustrated;
  document.getElementById("r-strug-label").textContent=L.strugLabel;
  document.getElementById("r-struggles").textContent=pa.struggles;
  document.getElementById("r-wrong-label").textContent=L.wrongLabel;
  document.getElementById("r-wrongrole").textContent=pa.wrongRole;
  document.getElementById("r-manage-title").textContent=L.manageTitle;
  document.getElementById("r-manage").textContent=pa.manage;
  document.getElementById("r-sec-title").textContent=`${L.secPrefix} ${L.archetypePrefix} ${sa.name} ${saE}`;
  document.getElementById("r-sec-desc").textContent=L.secDescTemplate(userName, sa.tagline, sa.desc.split('.')[0], sa.goodAt[0].toLowerCase(), sa.goodAt[1].toLowerCase());
  document.getElementById("btn-restart").textContent=L.restartBtn;
}

function restart() {
  document.getElementById("name-input").value="";
  document.getElementById("btn-name-next").classList.remove("active");
  showPage("home");
}

// Init
renderHome();
</script>
